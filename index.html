<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSnaps — Photography Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playball&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow+Condensed:wght@200;300;400;500&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F2EC;
    --dark: #0D0D0B;
    --mid: #1C1C18;
    --warm: #C8B89A;
    --accent: #B8956A;
    --gold: #C9A84C;
    --text-muted: #888880;
    --text-light: #BBBBA8;
    --gap-standard: 1.5rem;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* Ensure scrollbars don't pop out behind the preloader curtain */
  body.preloading { overflow: hidden !important; }

  /* ── CINEMATIC OPENING OVERLAY ── */
  #site-preloader {
    position: fixed;
    inset: 0;
    background: var(--dark);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1), opacity 1.2s ease;
    will-change: transform, opacity;
  }
  #site-preloader.loaded {
    transform: translateY(-100%);
    opacity: 0;
  }
  .preloader-inner {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .preloader-logo {
    font-family: 'Playball', cursive;
    font-size: clamp(3.5rem, 8vw, 6.5rem);
    line-height: 1;
    margin-bottom: 1.5rem;
    color: var(--cream);
    opacity: 0;
    transform: scale(0.96) translateY(15px);
    animation: preloaderTextIn 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.3s;
  }
  .preloader-logo .p-letter { color: var(--gold); }
  
  .preloader-line-wrap {
    width: 140px;
    height: 1px;
    background: rgba(200, 184, 154, 0.15);
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .preloader-line {
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 100%;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: center;
    animation: preloaderLineIn 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards 0.6s;
  }
  .preloader-manifesto {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(10px);
    animation: preloaderFadeIn 1s ease forwards 1.2s;
  }

  @keyframes preloaderTextIn { to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes preloaderLineIn { to { transform: scaleX(1); } }
  @keyframes preloaderFadeIn { to { opacity: 1; transform: translateY(0); } }

  /* ── NAVIGATION ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.4rem 3rem;
    background: linear-gradient(to bottom, rgba(13,13,11,0.95) 0%, transparent 100%);
    backdrop-filter: blur(4px);
  }
  .logo {
    font-family: 'Playball', cursive;
    font-size: 2.1rem;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }
  .logo-ps { color: var(--gold); }
  .logo-naps { color: var(--cream); margin-left: -0.05em; }

  /* ── HERO SPLIT LAYOUT ── */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 6rem 0 0 3rem;
    overflow: hidden;
    position: relative;
  }
  .hero-layout {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    width: 100%;
    align-items: center;
    gap: 4rem;
  }
  .hero-content { position: relative; z-index: 2; padding-right: 1rem; }
  
  .hero-image-pane {
    position: relative;
    width: 100%;
    height: calc(100vh - 6rem);
    overflow: hidden;
    background: var(--mid);
  }
  .hero-cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    filter: brightness(0.88) contrast(1.02);
    display: block;
  }

  .hero-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2rem;
  }
  .hero-display-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    line-height: 1.15;
    margin-bottom: 2.5rem;
    display: flex;
    flex-direction: column;
  }
  .hero-display-title .line-primary { font-size: clamp(2.8rem, 5.2vw, 5.2rem); color: var(--cream); display: block; }
  .hero-display-title .line-connective { font-size: clamp(1.5rem, 2.5vw, 2.2rem); font-style: italic; color: var(--warm); margin-top: 1.4rem; margin-bottom: 0.6rem; display: block; }
  .hero-display-title .line-author { font-size: clamp(2.8rem, 5.2vw, 5.2rem); color: var(--cream); display: block; }
  
  .hero-desc { font-size: 0.95rem; letter-spacing: 0.03em; color: var(--text-light); line-height: 1.65; max-width: 440px; margin-bottom: 3rem; }
  .hero-cta { display: inline-flex; align-items: center; gap: 0.8rem; font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--cream); text-decoration: none; border-bottom: 1px solid var(--gold); padding-bottom: 0.3rem; transition: color 0.3s; }
  .hero-cta:hover { color: var(--gold); }

  @media (max-width: 992px) {
    .hero { padding: 6rem 2rem 0 2rem; }
    .hero-layout { grid-template-columns: 1fr; gap: 2.5rem; }
    .hero-image-pane { height: 55vh; }
  }
  @media (max-width: 768px) {
    .hero { padding: 6rem 1.2rem 0 1.2rem; }
    .hero-display-title .line-primary, .hero-display-title .line-author { font-size: 2.5rem; }
    .hero-image-pane { height: 45vh; }
  }
</style>
</head>
<body class="preloading">

<div id="site-preloader">
  <div class="preloader-inner">
    <div class="preloader-logo">
      <span class="p-letter">P</span><span class="snaps-letters">Snaps</span>
    </div>
    <div class="preloader-line-wrap">
      <div class="preloader-line"></div>
    </div>
    <p class="preloader-manifesto">Visual Journeys &bull; Fine Art Photography</p>
  </div>
</div>

<nav>
  <a href="#" class="logo"><span class="logo-ps">PS</span><span class="logo-naps">Snaps</span></a>
</nav>

<section class="hero">
  <div class="hero-layout">
    <div class="hero-content">
      <p class="hero-eyebrow">Photography Portfolio</p>
      <h1 class="hero-display-title">
        <span class="line-primary">The Fabric</span>
        <span class="line-primary">of Space &amp; Time</span>
        <span class="line-connective">from the lens of</span>
        <span class="line-author">Pradyumna Saripalli</span>
      </h1>
      <p class="hero-desc">Capturing life, light and culture, one frame at a time.</p>
      <a href="#" class="hero-cta">Explore Gallery &rarr;</a>
    </div>

    <div class="hero-image-pane">
      <img class="hero-cover-img" src="{{ cover_image }}" alt="Featured Cover Art Canvas" onerror="this.style.display='none';">
    </div>
  </div>
</section>

<script>
  // Track page lifecycle completion to transition preloader overlay cleanly
  window.addEventListener('load', () => {
    const preloader = document.getElementById('site-preloader');
    if (preloader) {
      setTimeout(() => {
        preloader.classList.add('loaded');
        document.body.classList.remove('preloading');
        setTimeout(() => { preloader.remove(); }, 1200);
      }, 2200); // Editorial hold time window
    }
  });
</script>
</body>
</html>
